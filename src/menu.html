<head>
    <style>
        .roku-dpad-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 300px;
    width: 100%;
}

.roku-dpad-outer {
    position: relative;
    width: 200px;
    height: 200px;
    background-color: #333;
    border-radius: 50%; /* Creates the circular shape */
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
}

.dpad-button, .roku-dpad-center {
    position: absolute;
    cursor: pointer;
    background-color: #555;
    color: white;
    border: none;
    padding: 10px;
    font-size: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.dpad-button:hover, .roku-dpad-center:hover {
    background-color: #777;
}

.roku-dpad-center {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* Centers the button */
}

/* Positioning the directional buttons */
.up {
    width: 50px;
    height: 40px;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
}

.down {
    width: 50px;
    height: 40px;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
}

.left {
    width: 40px;
    height: 50px;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
}

.right {
    width: 40px;
    height: 50px;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
}

    </style>
